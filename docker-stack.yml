version: '3.8'

networks:
  red-interna:
    driver: overlay
    attachable: true

volumes:
  datos-postgres-nfs:
    external: true   # Debes crear este volumen NFS manualmente antes de desplegar

services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - datos-postgres-nfs:/var/lib/postgresql/data
    networks:
      - red-interna
    deploy:
      placement:
        constraints: [node.role == manager]
      replicas: 1

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - red-interna
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s

  frontend:
    build: ./frontend
    networks:
      - red-interna
    deploy:
      replicas: 2

  proxy:
    image: nginx:alpine
    ports:
      - "${PROXY_PORT}:80"
    volumes:
      - ./nginx-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - red-interna
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
